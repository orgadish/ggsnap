on:
  push:
    branches: [main, master]
  pull_request:

name: test-coverage

permissions:
  contents: read
  id-token: write

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr
          needs: coverage

      - name: Test coverage
        run: covr::package_coverage(type = "all", clean = FALSE) |> covr::to_cobertura()
        shell: Rscript {0}

      - uses: codecov/codecov-action@v5
        with:
          files: ./cobertura.xml
          use_oidc: true
          verbose: true
